services:
  chatbot:
    build:
      context: .
      target: dev
    image: giga-chatbot-dev
    container_name: giga-chatbot-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_BASE_PATH=/chat
      - MAIN_APP_URL=${MAIN_APP_URL:-http://orbis-track-proxy-1}
      - LLM_PROVIDER=${LLM_PROVIDER:-google}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-google}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_API_KEY_CHAT=${GOOGLE_API_KEY_CHAT:-${GOOGLE_API_KEY}}
      - GOOGLE_API_KEY_EMBEDDING=${GOOGLE_API_KEY_EMBEDDING:-${GOOGLE_API_KEY}}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_CHAT=${OPENROUTER_API_KEY_CHAT:-${OPENROUTER_API_KEY}}
      - OPENROUTER_API_KEY_EMBEDDING=${OPENROUTER_API_KEY_EMBEDDING:-${OPENROUTER_API_KEY}}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL_NAME=${OPENROUTER_MODEL_NAME:-openai/gpt-4o-mini}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL:-text-embedding-3-small}
      - GOOGLE_MODEL_NAME=${GOOGLE_MODEL_NAME:-gemini-2.0-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embedding-001}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-45000}
      - LOW_QUOTA_MODE=${LOW_QUOTA_MODE:-false}
      - ENABLE_LLM_INTENT_CLASSIFIER=${ENABLE_LLM_INTENT_CLASSIFIER:-true}
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-true}
      - ENABLE_RAG_GENERAL_QUESTION=${ENABLE_RAG_GENERAL_QUESTION:-true}
      - ENABLE_RAG_DEVICE_LOOKUP=${ENABLE_RAG_DEVICE_LOOKUP:-false}
      - ENABLE_RAG_TICKET_LOOKUP=${ENABLE_RAG_TICKET_LOOKUP:-false}
      - QUERY_EMBEDDING_CACHE_TTL_MS=${QUERY_EMBEDDING_CACHE_TTL_MS:-300000}
      - QUERY_EMBEDDING_CACHE_MAX_SIZE=${QUERY_EMBEDDING_CACHE_MAX_SIZE:-256}
    networks:
      - orbis_dev_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:3000/chat/api/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    image: giga-chatbot-worker
    container_name: giga-chatbot-worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-google}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_API_KEY_EMBEDDING=${GOOGLE_API_KEY_EMBEDDING:-${GOOGLE_API_KEY}}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_EMBEDDING=${OPENROUTER_API_KEY_EMBEDDING:-${OPENROUTER_API_KEY}}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-embedding-001}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-768}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - DEBOUNCE_MS=${DEBOUNCE_MS:-500}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-5}
      - WORKER_RETRY_MAX=${WORKER_RETRY_MAX:-3}
      - WORKER_RETRY_DELAY_MS=${WORKER_RETRY_DELAY_MS:-1000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - orbis_dev_network
    restart: always
    depends_on:
      chatbot:
        condition: service_healthy

networks:
  orbis_dev_network:
    external: true
