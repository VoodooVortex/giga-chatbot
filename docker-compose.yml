services:
  chatbot:
    build:
      context: .
      target: runner
    image: giga-chatbot-prod
    container_name: giga-chatbot-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MAIN_APP_URL=${MAIN_APP_URL}
    networks:
      - orbis_prod_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/chat/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    image: giga-chatbot-worker
    container_name: giga-chatbot-worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - DEBOUNCE_MS=${DEBOUNCE_MS:-500}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-5}
      - WORKER_RETRY_MAX=${WORKER_RETRY_MAX:-3}
      - WORKER_RETRY_DELAY_MS=${WORKER_RETRY_DELAY_MS:-1000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - orbis_prod_network
    restart: always
    depends_on:
      chatbot:
        condition: service_healthy

networks:
  orbis_prod_network:
    external: true
